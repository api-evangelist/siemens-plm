openapi: 3.0.0
info:
  version: v1.5
  title: TcPCM Gateway API
  description: TcPCM Gateway API
  license:
    name: Privacy Policy
    url: https://www.plm.automation.siemens.com/global/en/legal/privacy-policy.html
paths:
  /token:
    post:
      tags:
        - Account
      summary: Login to get the bearer token for protected endpoints
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                grant_type:
                  type: string
                  default: password
                  description: Defines the method obtaining the access token.
                  enum:
                    - password
                    - applicationSession
                    - urn:ietf:params:oauth:grant-type:token-exchange
                    - refresh_token
                authenticatorId:
                  type: string
                  default: Siemens.TCPCM.AuthenticationMethod.TcPCM
                  description: >-
                    TcPCM authentication method to be used with the provided
                    credentials.
                  enum:
                    - Siemens.TCPCM.AuthenticationMethod.TcPCM
                    - Siemens.TCPCM.AuthenticationMethod.Windows
                    - Siemens.TCPCM.AuthenticationMethod.SamAuth
                client_id:
                  type: string
                  default: TcPCM
                  description: >-
                    Uniquely identifies the application making the request for
                    authentication purposes.
                client_secret:
                  type: string
                  default: Your_Client_Secret
                  description: >-
                    Confidential key used alongside the client_id to securely
                    authenticate the application making the request.
                username:
                  type: string
                  default: Administrator
                  description: TcPCM or Windows user name depending on the authenticatorId.
                password:
                  type: string
                  default: ''
                  description: Corresponding password of the username.
                subject_token_type:
                  type: string
                  description: >-
                    Type of the token to be exchanged for the login. Only
                    "urn:ietf:params:oauth:token-type:access_token" is
                    supported.
                  enum:
                    - urn:ietf:params:oauth:token-type:access_token
                subject_token:
                  type: string
                  description: Value of the exchanged token.
                tcpcmSessionKey:
                  type: string
                  description: >-
                    Session identifier that can be obtained via the TcPCM client
                    application plugin.
                refresh_token:
                  type: string
                  description: >-
                    Refresh token that you obtained via the initial
                    authentication.
              required:
                - grant_type
                - client_id
                - client_secret
      responses:
        '200':
          description: Successful login
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                    description: Bearer token for authorization
                  token_type:
                    type: string
                    description: Only "bearer" is supported
                  expires_in:
                    type: integer
                    description: Seconds until the token expires
                  refresh_token:
                    type: string
                    description: Token to be used for resetting the expiration date
                  as:client_id:
                    type: string
                    description: Requested client id
                  as:TcPCMAuthenticatorId:
                    type: string
                    description: Requested authenticator id
                  .issued:
                    type: string
                    description: Login timestamp
                  .expires:
                    type: string
                    description: Expiration date
                required:
                  - access_token
                  - token_type
                  - expires_in
                  - refresh_token
                  - as:client_id
                  - as:TcPCMAuthenticatorId
                  - .issued
                  - .expires
        '400':
          description: Bad request. Login failed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Error title
                  error_description:
                    type: string
                    description: Detailed error description
                required:
                  - error
                  - error_description
        '500':
          description: Server error. Login failed.
          content:
            text/html:
              schema:
                type: string
                description: Error description
      description: >-
        TcPCM supports three different login flows:

        1. **Resource Owner Password flow**: Use the *username* and *password*
        with the *grant\_type* "password" and *authenticatorId*
        "Siemens.TCPCM.AuthenticationMethod.TcPCM" or
        "Siemens.TCPCM.AuthenticationMethod.Windows".

        2. **Token Exchange flow**: Use the *subject\_token\_type* and
        *subject\_token* with the *grant\_type*
        "urn:ietf:params:oauth:grant-type:token-exchange" and *authenticatorId*
        "Siemens.TCPCM.AuthenticationMethod.SamAuth".

        3. **Custom flow**: Use the *tcpcmSessionKey* with the *grant\_type*
        "applicationSession" without *authenticatorId*.


        Refresh token flow:

        * The refresh token can be used to generate a new bearer token without
        re-authenticating.

        * The *grant\_type* must be set to "refresh\_token" and the
        *refresh\_token* must be provided that was obtained via the initial
        authentication.
  /api/v1/administration/users/{userName}:
    get:
      tags:
        - Administration
      summary: Fetch a user User by {userName}. Only allowed for admins.
      operationId: GetUser_GetUser
      security:
        - bearerHttpAuthentication: []
      parameters:
        - name: userName
          in: path
          description: User name
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response_of_UserResponseModel'
            text/json:
              schema:
                $ref: '#/components/schemas/Response_of_UserResponseModel'
            application/xml:
              schema:
                $ref: '#/components/schemas/Response_of_UserResponseModel'
            text/xml:
              schema:
                $ref: '#/components/schemas/Response_of_UserResponseModel'
        '401':
          description: Unauthorized
        '404':
          description: NotFound
      deprecated: false
      description: ''
    patch:
      tags:
        - Administration
      summary: Activates or deactivate a user
      operationId: ToggleUserActivation_ToggleActivation
      security:
        - bearerHttpAuthentication: []
      parameters:
        - name: userName
          in: path
          description: User name
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ToggleActivationRequestModel'
          text/json:
            schema:
              $ref: '#/components/schemas/ToggleActivationRequestModel'
          application/xml:
            schema:
              $ref: '#/components/schemas/ToggleActivationRequestModel'
          text/xml:
            schema:
              $ref: '#/components/schemas/ToggleActivationRequestModel'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ToggleActivationRequestModel'
        description: >-
          The request represents that {userName} will be either activated or
          deactivated.
        required: true
      responses:
        '204':
          description: NoContent
        '400':
          description: BadRequest
          content:
            application/json:
              schema:
                type: object
                properties:
                  Errors:
                    type: array
                    items:
                      $ref: '#/components/schemas/ErrorLegacy'
                readOnly: true
            text/json:
              schema:
                type: object
                properties:
                  Errors:
                    type: array
                    items:
                      $ref: '#/components/schemas/ErrorLegacy'
                readOnly: true
            application/xml:
              schema:
                type: object
                properties:
                  Errors:
                    type: array
                    items:
                      $ref: '#/components/schemas/ErrorLegacy'
                readOnly: true
            text/xml:
              schema:
                type: object
                properties:
                  Errors:
                    type: array
                    items:
                      $ref: '#/components/schemas/ErrorLegacy'
                readOnly: true
        '401':
          description: Unauthorized
        '404':
          description: NotFound
        '500':
          description: InternalServerError
      deprecated: false
  /api/v1/administration/application-version:
    get:
      tags:
        - Administration
      summary: Gets the current version of TcPCM. Available since version 2412
      description: Gets the current version of TcPCM
      operationId: Administration_GetApplicationVersion
      parameters: []
      responses:
        '200':
          description: Success. Returns the current running version of TcPCM
          headers: {}
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      version:
                        type: string
                        description: TcPCM version
                    required:
                      - version
                description: |
                  data
                required:
                  - data
              example:
                data:
                  version: '2406.0001'
        '400':
          $ref: '#/components/responses/ErrorBadRequestLegacy'
        '401':
          $ref: '#/components/responses/ErrorUnauthorizedLegacy'
        '406':
          $ref: '#/components/responses/ErrorNotAcceptableLegacy'
        '500':
          $ref: '#/components/responses/ErrorInternalServerErrorLegacy'
      security:
        - bearerHttpAuthentication: []
