          type: string
          description: Link to the first page
        last:
          type: string
          description: Link to the last page
      required:
        - self
        - next
        - prev
        - first
        - last
    PaginationMeta:
      type: object
      properties:
        number:
          type: integer
          description: Current page number
        totalPages:
          type: integer
          description: Total number of pages
        size:
          type: integer
          description: Number of elements per page
      required:
        - number
        - size
        - totalPages
    SelfLink:
      type: object
      properties:
        self:
          type: string
          description: Link to the current resource
      required:
        - self
    IntArray:
      type: array
      items:
        type: integer
    Date:
      type: string
      description: Date
      format: date
    IdArray:
      title: IdArray
      type: array
      description: Array with object ids
      uniqueItems: true
      maxItems: 100000
      items:
        type: integer
        minimum: 0
        maximum: 2147483647
      example:
        - 1
        - 5
        - 11
        - 3
        - 2423
        - 3039
        - 4521
    Guid:
      title: GUID
      type: string
      format: uuid
      maxLength: 36
      description: Global unique identifier
      example: 497f6eca-6276-4993-bfeb-53cbbbba6f08
    DataType:
      type: string
      enum:
        - double
        - integer
        - date
        - string
        - object
        - reference
        - bool
        - url
      example: double
    Column:
      title: Column
      type: object
      required:
        - dataType
      properties:
        name:
          type: string
          maxLength: 255
          minLength: 0
          description: Name of the data field
        displayName:
          type: string
          maxLength: 255
          minLength: 0
          description: Displayname of the column
        dataType:
          $ref: '#/components/schemas/DataType'
    DataSet:
      title: DataSet
      type: object
      description: >-
        Represents a two-dimensional data set with column descriptions including
        column data types.
      required:
        - data
        - columns
      properties:
        data:
          type: array
          description: >-
            Array of objects defining a two-dimensional array via the property
            names of the objects. See the 'columns' field for the display names
            and data types.
          maxItems: 100000
          items:
            type: object
        columns:
          type: array
          description: Columns of the dataset describing the names and the datatypes
          maxItems: 100000
          items:
            $ref: '#/components/schemas/Column'
    ErrorResponse:
