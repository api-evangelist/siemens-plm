  /api/v1/profitability-calculation-report:
    get:
      summary: >-
        Returns the profitability calculation report. Available since version
        2406.0001
      security:
        - bearerHttpAuthentication: []
      responses:
        '200':
          headers: {}
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/DataSet'
                  errors:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProfitabilityCalculationReportError'
                required:
                  - data
              examples:
                Example:
                  value:
                    data:
                      data:
                        - Name: Profitability Calculation for car A
                          Year: 2025
                          Revenue: 2346825
                        - Name: Profitability Calculation for car A
                          Year: 2026
                          Revenue: 4341822
                      columns:
                        - name: Name
                          displayName: Profitability Calculation Name
                          dataType: string
                        - name: Year
                          displayName: Year
                          dataType: integer
                        - name: Revenue
                          displayName: Revenue in €
                          dataType: double
                    errors:
                      - status: 404
                        detail: Profitability calculation not found
                        profitabilityCalculationId: 731
            application/xml:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/DataSet'
                  errors:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProfitabilityCalculationReportError'
                required:
                  - data
          description: Success. Returns the requested profitability calculation report.
        '400':
          $ref: '#/components/responses/ErrorBadRequestLegacy'
        '401':
          $ref: '#/components/responses/ErrorUnauthorizedLegacy'
        '406':
          $ref: '#/components/responses/ErrorNotAcceptableLegacy'
        '408':
          $ref: '#/components/responses/ErrorRequestTimeoutLegacy'
        '500':
          $ref: '#/components/responses/ErrorInternalServerErrorLegacy'
      operationId: get-ProfitabilityCalculation
      description: >-
        Returns the profitability calculation report. Available since version
        2406.0001.
      parameters:
        - $ref: '#/components/parameters/ProfitabilityCalculationIds'
        - $ref: '#/components/parameters/ProjectIds'
        - $ref: '#/components/parameters/ExportConfigurationGuid'
      tags:
        - Profitability Calculation
  /api/v1/aggregated-profitability-calculation-report:
    get:
      summary: >-
        Returns the aggregated profitability calculation report. Available since
        version 2512.2602
      security:
        - bearerHttpAuthentication: []
      responses:
        '200':
          headers: {}
          description: >-
            Success. Returns the requested aggregated profitability calculation
            report.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/DataSet'
                  errors:
                    type: array
                    items:
                      $ref: >-
                        #/components/schemas/AggregatedProfitabilityCalculationReportError
                required:
                  - data
              examples:
                Example:
                  value:
                    data:
                      data:
                        - Name: Aggregated Profitability Calculation for plant Munich
                          Year: 2025
                          Revenue: 2346825
                        - Name: Aggregated Profitability Calculation for plant Munich
                          Year: 2026
                          Revenue: 4341822
                      columns:
                        - name: Name
                          displayName: Aggregated Profitability Calculation Name
                          dataType: string
                        - name: Year
                          displayName: Year
                          dataType: integer
                        - name: Revenue
                          displayName: Revenue in €
                          dataType: double
                    errors:
                      - status: 404
                        detail: Aggregated profitability calculation not found
                        aggregatedProfitabilityCalculationId: 731
            application/xml:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/DataSet'
                  errors:
                    type: array
                    items:
                      $ref: >-
                        #/components/schemas/AggregatedProfitabilityCalculationReportError
                required:
                  - data
        '400':
          $ref: '#/components/responses/ErrorBadRequest'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '406':
          $ref: '#/components/responses/ErrorNotAcceptable'
        '408':
          $ref: '#/components/responses/ErrorRequestTimeout'
        '500':
          $ref: '#/components/responses/ErrorInternalServerError'
      operationId: get-AggregatedProfitabilityCalculationReport
      description: >-
        Returns the aggregated profitability calculation report. Available since
        version 2512.2602.
      parameters:
        - in: query
          name: AggregatedProfitabilityCalculationIds
          description: Ids of the aggregated profitability calculations to be exported.
          schema:
            type: array
            items:
              type: integer
          example:
            - 14
            - 362
            - 731
        - in: query
          name: FolderIds
          description: >-
            All aggregated profitability calculations of these folders are
            exported.
          schema:
            type: array
            items:
              type: integer
          example:
            - 5
            - 12
        - $ref: '#/components/parameters/ExportConfigurationGuid'
      tags:
        - Profitability Calculation
