apis:
  - aid: siemens-plm:teamcenter-product-cost-management
    name: Teamcenter Product Cost Management REST API
    description: >
      REST API for Teamcenter (X) Product Cost Management (TcPCM) enabling programmatic
      access to cost estimation, dynamic calculations, and bulk export of cost data. Supports
      OAuth 2.0 authentication via Resource Owner Password, Token Exchange, or TcPCM session
      key flows. Bulk export endpoints require license PPC10029.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://developer.siemens.com/tcpcm/overview.html
    baseURL: https://developer.siemens.com
    tags:
      - PLM
      - Product Cost Management
      - Teamcenter
      - Manufacturing
    properties:
      - type: Documentation
        url: https://developer.siemens.com/tcpcm/overview.html
      - type: OpenAPI
        url: https://developer.siemens.com/tcpcm/tcpcm-api-spec.yaml
      - type: GettingStarted
        url: https://developer.siemens.com/tcpcm/getting-started.html
      - type: Authentication
        url: https://developer.siemens.com/tcpcm/getting-started.html
    contact:
      - FN: Siemens PLM Support
        url: https://developer.siemens.com/tcpcm/contact.html
        email: ""

  - aid: siemens-plm:polarion-rest-api
    name: Polarion REST API
    description: >
      Integration layer REST API for Polarion ALM (Application Lifecycle Management) giving
      developers programmatic control over requirements, work items, documents, test cases,
      and project structure. Supports Personal Access Token, session-based token, JWT, and
      Teamcenter SSO authentication. OpenAPI spec available for download.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://developer.siemens.com/polarion/rest-api-spec.html
    baseURL: https://developer.siemens.com
    tags:
      - ALM
      - Application Lifecycle Management
      - Polarion
      - Requirements Management
    properties:
      - type: Documentation
        url: https://developer.siemens.com/polarion/rest-api-spec.html
      - type: OpenAPI
        url: https://developer.siemens.com/polarion/polarion-rest-apispec.json
      - type: Authentication
        url: https://developer.siemens.com/polarion/authentication.html
    contact:
      - FN: Siemens PLM Support
        url: https://support.sw.siemens.com
        email: ""

  - aid: siemens-plm:insights-hub-industrial-iot
    name: Insights Hub and Industrial IoT APIs
    description: >
      Suite of APIs for the Siemens Insights Hub (formerly MindSphere) Industrial IoT
      platform providing access to time series data, asset management, event management,
      Opcenter Intelligence, and manufacturing performance analytics. Authentication via
      OAuth 2.0 through Siemens Xcelerator Developer Dashboard.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://developer.siemens.com/apis.html
    baseURL: https://developer.siemens.com
    tags:
      - Industrial IoT
      - IIoT
      - Time Series
      - Asset Management
      - Manufacturing
      - Insights Hub
    properties:
      - type: Documentation
        url: https://developer.siemens.com/insights-hub/docs/apis/advanced-assetmanagement/api-assetmanagement-api.html
      - type: Documentation
        url: https://developer.siemens.com/insights-hub/docs/apis/advanced-opcenter-intelligence/api-opcenter-intelligence-api.html
    contact:
      - FN: Siemens Developer Portal
        url: https://developer.siemens.com
        email: ""

  - aid: siemens-plm:sigreen-api
    name: SiGREEN API
    description: >
      REST APIs for SiGREEN, Siemens' supply chain sustainability and carbon footprint
      management platform. Provides procurement, product, carbon footprint, and task
      management endpoints enabling organizations to track and manage product carbon
      footprints across global supply chains while preserving data sovereignty.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://developer.siemens.com/sigreen/product-api/api-product.html
    baseURL: https://developer.siemens.com
    tags:
