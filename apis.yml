      - Carbon Footprint
      - Supply Chain
      - ESG
      - SiGREEN
    properties:
      - type: Documentation
        url: https://developer.siemens.com/sigreen/product-api/api-product.html
    contact:
      - FN: Siemens Developer Portal
        url: https://developer.siemens.com
        email: ""

  - aid: siemens-plm:product-information-api
    name: Product Information API
    description: >
      REST API empowering CMMS (Computerized Maintenance Management Systems) with product
      information capabilities for functional obsolescence risk mitigation. Available via
      subscription through the Siemens Xcelerator Developer Portal. Sandbox access can be
      requested through the Developer Dashboard. OpenAPI specification available for download.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://developer.siemens.com/product-information-api/rest-api-spec.html
    baseURL: https://developer.siemens.com
    tags:
