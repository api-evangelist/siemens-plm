aid: siemens-plm
name: Siemens PLM
description: >
  Siemens PLM is Siemens Digital Industries Software's product lifecycle management platform
  offering REST APIs for Teamcenter (PDM/PLM), Polarion (ALM), Insights Hub (Industrial IoT),
  SiGREEN (sustainability), and the broader Siemens Xcelerator portfolio for digital
  manufacturing, simulation via Simcenter, and CAD/CAM tooling including NX and Solid Edge.
  The Siemens Xcelerator Developer Portal provides OpenAPI specifications, SDKs, Postman
  collections, and sandbox access for developers integrating with these industrial platforms.
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/siemens-plm/refs/heads/main/apis.yml
